name: assignment_excercise_module
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1

  # Local Database
  sqflite: ^2.3.0
  path: ^1.8.3

  # Sensors & Location
  pedometer: ^4.0.1
  geolocator: ^10.1.0
  permission_handler: ^11.0.1

  # Maps - OpenStreetMap
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  #storage store goal defined in exercise module "live_exercise_view.dart"
  shared_preferences: ^2.5.5

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Background Services (this cause the trouble) remove from ur json
#  workmanager: ^0.5.2

  # Keep screen awake during workout
  wakelock_plus: ^1.1.4

  # UI Components
  cupertino_icons: ^1.0.6
  intl: ^0.18.1


  # Map Display google map need pay
  # google_maps_flutter: ^2.5.0
  # flutter_polyline_points: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Uncomment and add assets if needed
  # assets:
